<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JRL</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(135deg, #0f172a, #1e2937);
            color: white;
            min-height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 4.5em;
            margin: 0 0 10px 0;
            font-weight: 700;
            letter-spacing: -2px;
            color: #E8C670;
        }
        .subtitle {
            font-size: 1.6em;
            color: #94a3b8;
            margin-bottom: 60px;
        }
        .example {
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 12px;
            margin: 40px auto;
            max-width: 520px;
            font-family: monospace;
            font-size: 1.05em;
            line-height: 1.5;
            word-break: break-all;
        }
        .byline {
            font-size: 1.3em;
            color: #64748b;
            margin-top: 80px;
        }
        a {
            color: #E8C670;
            text-decoration: none;
            font-weight: 600;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>JRL</h1>
    <p class="subtitle">Journal of Record Language</p>

    <div class="example">
        <strong>Example JRL:</strong><br>
        jrl.sh/invention.Govsh/100.1Ⓖ/0.tax/crediting.URL/
    </div>

    <p class="byline">Technology by <a href="https://govsh.com">Govsh</a></p>
</body>
</html>
